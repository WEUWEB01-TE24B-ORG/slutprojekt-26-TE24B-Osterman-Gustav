<!DOCTYPE html>
<html lang="sv">

<head>

    <title>Gossedjurs Klubben</title>

<body onload="updateCartAmount()">

    <div id="Pingvingossedjur">

    </div>
    <div id="Rävgossedjur">

            <h2>999kr</h2>

    </div>
    <div id="Apgosedjur">
        <div class="Products">
            <img src="./img/Monkey.webp" alt="Apgosedjur">
            <h2>999kr</h2>
            <h2 class="Button" onclick="sendProductToCart('Apgosedjur')">Lägg till i kundvagnen</h2>
        </div>
    </div>
    <footer>
        <h1>För hjälp kontakta: <a href="mailto:Noreply@osterman.org">Noreply@osterman.org</a></h1>
