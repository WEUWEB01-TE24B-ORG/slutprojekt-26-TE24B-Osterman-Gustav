<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gitarrbutiken</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="scripts.js"></script>
</head>

<body onload="updateCartAmount()">
    <header>
        <h1>Gitarrbutiken</h1>

        <img class="Button" src="./img/Search.webp" alt="Sök" onclick="test()">
        <img class="Button" id="cartIcon" src="./img/ShoppingCart.webp" alt="Varukorg"
            onclick="toOtherPage('Checkout.html')">
    </header>

    <div id="ProductSection"></div>

    <div id="ProductHeader">
        <h1>Gitarrer</h1>
    </div>

    <div id="Stratocaster">
        <div class="Products">
            <img src="./img/Stratocaster.webp" alt="Fender Stratocaster elgitarr">
            <h2>7999kr</h2>
            <h2 class="Button" onclick="sendProductToCart('Stratocaster')">Lägg till i kundvagnen</h2>
        </div>
    </div>

    <div id="LesPaul">
        <div class="Products">
            <img src="./img/LesPaul.webp" alt="Gibson Les Paul elgitarr">
            <h2>11999kr</h2>
            <h2 class="Button" onclick="sendProductToCart('LesPaul')">Lägg till i kundvagnen</h2>
        </div>
    </div>

    <div id="AkustiskGitarr">
        <div class="Products">
            <img src="./img/Acoustic.webp" alt="Akustisk gitarr Yamaha">
            <h2>1999kr</h2>
            <h2 class="Button" onclick="sendProductToCart('AkustiskGitarr')">Lägg till i kundvagnen</h2>
        </div>
    </div>

    <div id="Elbas">
        <div class="Products">
            <img src="./img/Bass.webp" alt="Ibanez elbas">
            <h2>4999kr</h2>
            <h2 class="Button" onclick="sendProductToCart('Elbas')">Lägg till i kundvagnen</h2>
        </div>
    </div>

    <div id="KlassiskGitarr">
        <div class="Products">
            <img src="./img/Classical.webp" alt="Klassisk gitarr nylonsträngad">
            <h2>1499kr</h2>
            <h2 class="Button" onclick="sendProductToCart('KlassiskGitarr')">Lägg till i kundvagnen</h2>
        </div>
    </div>

    <div id="ModernElgitarr">
        <div class="Products">
            <img src="./img/Electric.webp" alt="Modern elgitarr">
            <h2>5999kr</h2>
            <h2 class="Button" onclick="sendProductToCart('ModernElgitarr')">Lägg till i kundvagnen</h2>
        </div>
    </div>

    <footer>
        <h1>För hjälp kontakta: <a href="mailto:Noreply@osterman.org">Noreply@osterman.org</a></h1>
    </footer>
</body>

</html>
